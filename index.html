<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorize</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>Memo<span>rize</span></h1>

  <div class="theme-toggle" id="themeToggle" title="Changer de thème">
    <span class="icon">☀️</span>
    <div class="toggle-track" id="toggleTrack">
      <div class="toggle-thumb"></div>
    </div>
    <span class="icon">🌙</span>
  </div>
</div>

<div class="slider-wrap">
  <label>Difficulté</label>
  <input type="range" id="slider" min="0" max="100" value="0" step="1">
  <div class="difficulty-value" id="diffVal">0.00</div>
</div>

<div class="layout">
  <div class="panel">
    <div class="panel-label">Texte source</div>
    <label class="file-btn" for="fileInput">Charger un fichier .txt / .md</label>
    <input type="file" id="fileInput" accept=".txt,.md">
    <textarea id="input" spellcheck="false" placeholder="Collez ou chargez votre texte ici…"></textarea>
    <div class="stats" id="statsIn"></div>
  </div>

  <div class="panel">
    <div class="panel-label">Résultat</div>
    <div id="output"></div>
    <div class="stats" id="statsOut"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="app.js"></script>
</body>
</html>
